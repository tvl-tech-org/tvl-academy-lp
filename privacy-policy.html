<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy | TVL Academy</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="canonical" href="https://academy.tvl.tech/privacy-policy.html">
  <link rel="alternate" hreflang="ro" href="https://academy.tvl.tech/ro/privacy-policy.html">
  <link rel="alternate" hreflang="en" href="https://academy.tvl.tech/en/privacy-policy.html">
  <link rel="alternate" hreflang="x-default" href="https://academy.tvl.tech/privacy-policy.html">
  <script>
    (function redirectToLocalizedPolicy() {
      var storageKey = 'tvl_locale_pref';

      function normalizeLocale(value) {
        if (!value || typeof value !== 'string') return 'en';
        return value.toLowerCase().indexOf('ro') === 0 ? 'ro' : 'en';
      }

      function readSavedLocale() {
        try {
          var saved = window.localStorage.getItem(storageKey);
          return saved ? normalizeLocale(saved) : null;
        } catch (error) {
          return null;
        }
      }

      function detectBrowserLocale() {
        var browserLocales = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || navigator.userLanguage || 'en'];
        for (var index = 0; index < browserLocales.length; index += 1) {
          if (normalizeLocale(browserLocales[index]) === 'ro') return 'ro';
        }
        return 'en';
      }

      var locale = readSavedLocale() || detectBrowserLocale();
      window.location.replace('/' + locale + '/privacy-policy.html');
    }());
  </script>
</head>
<body>
  <p><a href="/ro/privacy-policy.html">RO</a> | <a href="/en/privacy-policy.html">EN</a></p>
</body>
</html>
