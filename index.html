  <style>
    :root {
      --red: #ff4a3d;
      --bg: #f7f6f4;
      --text: #111111;
      --text-sec: #4a4a4a;
      --border: #e6e1db;
      --font: "Open Sans", "Segoe UI", sans-serif;
      --display: "Open Sans", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--font);
    }
    .card {
      width: min(560px, 100%);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-family: var(--display);
      font-size: clamp(28px, 5vw, 42px);
    }
    p {
      margin: 0 0 18px;
      color: var(--text-sec);
      line-height: 1.7;
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .links a {
      min-width: 88px;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-family: var(--display);
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      background: var(--red);
    }
    .links a.secondary {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Redirecting…</h1>
    <p>We are sending you to the right language version based on your browser locale or the last language you selected.</p>
    <div class="links">
      <a href="/ro/">RO</a>
      <a href="/en/" class="secondary">EN</a>
    </div>
  </main>
  <script>
    (function redirectToLocale() {
      var storageKey = 'tvl_locale_pref';

      function normalizeLocale(value) {
        if (!value || typeof value !== 'string') return 'en';
        return value.toLowerCase().indexOf('ro') === 0 ? 'ro' : 'en';
      }

      function readSavedLocale() {
        try {
          return normalizeLocale(window.localStorage.getItem(storageKey));
        } catch (error) {
          return null;
        }
      }

      function detectBrowserLocale() {
        var browserLocales = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || navigator.userLanguage || 'en'];
        for (var index = 0; index < browserLocales.length; index += 1) {
          if (normalizeLocale(browserLocales[index]) === 'ro') return 'ro';
        }
        return 'en';
      }

      var savedLocale = readSavedLocale();
      var locale = savedLocale || detectBrowserLocale();
      window.location.replace('/' + locale + '/');
    }());
  </script>
</body>
